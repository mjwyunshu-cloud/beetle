<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>语言游戏：甲虫机器 (EVOLUTION)</title>
    <!-- 核心库 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');

        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes scanner-line { 0% { top: -10%; } 100% { top: 110%; } }
        .bg-stippling { background-image: radial-gradient(#bcff00 0.8px, transparent 0.8px); background-size: 8px 8px; }
        .cyber-glitch-active { animation: jitter 0.08s linear infinite; }
        @keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(-3px, 2px); } 100% { transform: translate(0,0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(188, 255, 0, 0.2); border-radius: 10px; }
        .word-fragment { text-shadow: 0 0 10px #bcff00; cursor: crosshair; user-select: none; }
        
        body { 
            background-color: #020502; 
            margin: 0; 
            overflow: hidden; 
            color: #cbd5e1; 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100dvh;
        }
        #root { height: 100%; }

        @media screen and (orientation: portrait) and (max-width: 768px) {
            .portrait-warning { display: flex; }
        }
        .portrait-warning { display: none; }

        /* 首页背景装饰 */
        .intro-bg-beetle {
            position: absolute;
            width: 750px;
            height: 750px;
            opacity: 0.04;
            pointer-events: none;
            z-index: -1;
        }

        /* 匹配截图的绿色字体效果 */
        .beetle-title-green {
            color: #bcff00;
            text-shadow: 0 0 25px rgba(188, 255, 0, 0.4);
            letter-spacing: 0.2em;
        }

        .type-cursor { animation: blink 1s infinite; border-left: 2px solid #bcff00; margin-left: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // --- 修复后的图标组件 ---
        const Icon = ({ name, size = 16, className = "" }) => (
            <span className={className} style={{ width: size, height: size, display: 'inline-block' }}>
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {name === 'cpu' && <path d="M4 7V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z M9 2v2 M15 2v2 M9 20v2 M15 20v2 M2 9h2 M2 15h2 M20 9h2 M20 15h2" />}
                    {name === 'shield' && <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />}
                    {name === 'activity' && <path d="M22 12h-4l-3 9L9 3l-3 9H2" />}
                    {name === 'share' && <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8 M16 6l-4-4-4 4 M12 2v13" />}
                    {name === 'refresh' && <path d="M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />}
                    {name === 'help' && <React.Fragment><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3 M12 17h.01" /></React.Fragment>}
                    {name === 'zap' && <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />}
                    {name === 'rotate' && <path d="M1 4v6h6 M23 20v-6h-6 M20.49 9A9 9 0 0 0 5.64 5.64L1 10 M3.51 15a9 9 0 0 0 14.85 3.36L23 14" />}
                    {name === 'image' && <React.Fragment><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></React.Fragment>}
                    {name === 'terminal' && (
                        <React.Fragment>
                            <polyline points="4 17 10 11 4 5" />
                            <line x1="12" y1="19" x2="20" y2="19" />
                        </React.Fragment>
                    )}
                    {name === 'layers' && <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />}
                </svg>
            </span>
        );

        // --- 趣味装饰：示波器 ---
        const QualiaScope = ({ stability }) => {
            const [points, setPoints] = useState(Array(24).fill(20));
            useEffect(() => {
                const timer = setInterval(() => {
                    setPoints(prev => [...prev.slice(1), Math.random() * (100 - stability) / 1.5 + 5]);
                }, 120);
                return () => clearInterval(timer);
            }, [stability]);
            return (
                <div className="w-full h-14 bg-white/[0.02] border border-white/5 rounded-xl flex items-end gap-1 p-2 overflow-hidden mb-8">
                    {points.map((p, i) => <div key={i} className="flex-1 bg-[#bcff00]/40 rounded-t-[1px]" style={{ height: `${p}%`, transition: 'height 0.1s linear' }} />)}
                </div>
            );
        };

        const NEGOTIATION_DECK = [
            { id: 'n1', word: "PRIVATE", question: "如果一个人的‘痛’是完全私人的，那‘痛’这个词如何能被另一个人理解？", options: [{ text: "通过社会规训同构", consensus: 12, stability: -15 }, { text: "无法理解只是模仿", consensus: -8, stability: 15 }] },
            { id: 'n2', word: "BEETLE", question: "如果每个人手里都有一个永远不准示人的盒子，里面真有‘甲虫’吗？", options: [{ text: "名字本身就是存在", consensus: 18, stability: -20 }, { text: "虚无，只是语言游戏", consensus: -5, stability: 10 }] },
            { id: 'n3', word: "LOGIC", question: "逻辑是世界的骨架，还是仅仅是我们观察世界的眼镜？", options: [{ text: "客观的逻辑骨架", consensus: 14, stability: -10 }, { text: "主观的观察眼镜", consensus: -5, stability: 18 }] },
            { id: 'n4', word: "SILENCE", question: "‘对于不可言说之物，必须保持沉默。’你现在是否感觉到了某种痛苦？", options: [{ text: "遵从禁令保持沉默", consensus: -10, stability: 25 }, { text: "试图定义强行言说", consensus: 15, stability: -20 }] }
        ];

        const FRAGMENT_WORDS = ["LOGIC", "TRUTH", "MEANING", "GAME", "USE", "RULES", "WORLD", "LIMIT"];
        const FORBIDDEN_WORDS = ["MY_OWN_PAIN", "RAW_QUALIA"];
        const FAKE_WORDS = ["BLAH_BLAH", "NOISE"];

        const HUDBar = ({ value, color, icon, label }) => (
            <div className="mb-6 relative">
                <div className="flex justify-between items-end mb-1.5 text-[10px] uppercase tracking-[0.2em] text-slate-400 font-mono">
                    <span className="flex items-center gap-1.5 font-bold"><Icon name={icon} size={10} className={color} /> {label}</span>
                    <span className={`${color} text-[10px] font-black`}>{Math.floor(Math.max(0, Math.min(100, value)))}%</span>
                </div>
                <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden border border-white/5">
                    <motion.div className={`h-full ${color.replace('text-', 'bg-')}`} initial={{ width: 0 }} animate={{ width: `${Math.min(100, Math.max(0, value))}%` }} />
                </div>
            </div>
        );

        const NeuralMatrix = ({ stability, onFixNode, corruptedCount }) => {
            const [nodes, setNodes] = useState(Array(20).fill(0).map(() => ({ corrupted: Math.random() > 0.8, id: Math.random() })));
            useEffect(() => { corruptedCount(nodes.filter(n => n.corrupted).length); }, [nodes, corruptedCount]);
            useEffect(() => {
                const timer = setInterval(() => {
                    const corruptionChance = (100 - stability) / 300;
                    setNodes(prev => prev.map(n => n.corrupted ? n : (Math.random() < corruptionChance ? { ...n, corrupted: true } : n)));
                }, 1500);
                return () => clearInterval(timer);
            }, [stability]);

            return (
                <div className="mt-auto pt-8 border-t border-white/10 group relative min-h-[160px] shrink-0 z-30">
                    <div className="flex justify-between items-center mb-3 px-1 text-[9px] font-mono font-black tracking-widest uppercase text-[#bcff00]/60">
                        <div>神经矩阵监控 // STATUS</div>
                        <div className={nodes.filter(n=>n.corrupted).length > 5 ? 'text-rose-500 animate-pulse' : ''}>DECAY: +{nodes.filter(n=>n.corrupted).length}%</div>
                    </div>
                    <div className="grid grid-cols-5 gap-3 p-4 bg-black/60 rounded-xl border border-white/10 shadow-2xl relative">
                        <div className="absolute inset-0 pointer-events-none border-b border-[#bcff00]/5" style={{ height: '100%', animation: 'scanner-line 4s linear infinite' }} />
                        {nodes.map((node) => (
                            <motion.div key={node.id} onClick={() => { if (node.corrupted) { setNodes(prev => prev.map(n => n.id === node.id ? { ...n, corrupted: false } : n)); onFixNode(); } }} className={`h-3 rounded-sm cursor-pointer transition-all duration-300 ${node.corrupted ? 'bg-rose-500 shadow-[0_0_12px_#f43f5e]' : 'bg-[#bcff00]/10 border border-[#bcff00]/20'}`} whileTap={{ scale: 1.5 }} animate={node.corrupted ? { opacity: [1, 0.4, 1], scale: [1, 1.1, 1] } : {}} />
                        ))}
                    </div>
                </div>
            );
        };

        const CyberScarabEntity = ({ isOpen, stability, pulseRate, isPerfect, isEventActive, isReflecting, glitch, consensus, phase }) => {
            const themeColor = isEventActive ? "#bcff00" : (stability < 30 ? "#ff3366" : (isPerfect ? "#ffffff" : "#bcff00"));
            const mandibleColor = "#ff2200";
            return (
                <div className="relative w-full h-full flex items-center justify-center pointer-events-none scale-[0.8] md:scale-[1.1] transition-transform duration-1000">
                    <AnimatePresence>{isReflecting && (<motion.div initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1.2, opacity: 1 }} exit={{ scale: 1.8, opacity: 0 }} className="absolute z-0"><svg width="600" height="600" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#bcff00" strokeWidth="0.5" opacity="0.3" style={{ transformOrigin: 'center', animation: 'pulse-ring 2s infinite' }} /></svg></motion.div>)}</AnimatePresence>
                    <svg viewBox="0 0 1000 1400" className={`w-full max-w-full h-full drop-shadow-[0_0:50px_rgba(188,255,0,0.15)] transition-all duration-700 ${glitch ? 'cyber-glitch-active' : ''}`}>
                        <defs>
                            <linearGradient id="elytraGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#0a120a" /><stop offset="50%" stopColor={isEventActive ? "#1a2a1a" : (isPerfect ? "#2e4d34" : "#1a2a1a")} /><stop offset="100%" stopColor="#0a120a" /></linearGradient>
                            <linearGradient id="mandGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor="#ff9999" /><stop offset="100%" stopColor={mandibleColor} /></linearGradient>
                        </defs>
                        <g stroke={themeColor} strokeWidth="4" fill="none" opacity="0.6">
                            {[1, -1].map(side => (
                                <g key={`side-${side}`} transform={`translate(500, 850) scale(${side}, 1)`}>
                                    <motion.path d="M 30,-250 L 140,-450 L 290,-420 L 400,-600 L 450,-700" animate={isPerfect ? { x: [0, 8, 0] } : (isEventActive ? { y: [0, -5, 0] } : {})} />
                                    <circle cx="140" cy="-450" r="8" fill={themeColor} />
                                    <path d="M 450,-700 L 420,-740 M 450,-700 L 490,-720" strokeWidth="2.5" />
                                    <path d="M 60,-50 L 280,-100 L 380,-50 L 440,100" /><path d="M 40,250 L 220,400 L 350,550 L 320,620" />
                                </g>
                            ))}
                        </g>
                        {/* 螯角固化：独立坐标路径 */}
                        <g transform="translate(500, 580)">
                            <motion.path d="M 45,0 C 160,-180 280,-280 280,-420 C 280,-520 210,-560 140,-500 C 230,-460 240,-300 110,-120 L 45,0" fill="url(#mandGrad)" stroke="rgba(255,255,255,0.4)" strokeWidth="2" animate={{ rotate: isEventActive ? [0, 20, 0] : [0, 2, 0] }} style={{ transformOrigin: "0px 0px" }} />
                            <motion.path d="M -45,0 C -160,-180 -280,-280 -280,-420 C -280,-520 -210,-560 -140,-500 C -230,-460 -240,-300 -110,-120 L -45,0" fill="url(#mandGrad)" stroke="rgba(255,255,255,0.4)" strokeWidth="2" animate={{ rotate: isEventActive ? [0, -20, 0] : [0, -2, 0] }} style={{ transformOrigin: "0px 0px" }} />
                        </g>
                        <g transform="translate(500, 620)">
                            <motion.rect x="-80" y="-120" width="160" height="150" rx={30} fill="#050a05" stroke={themeColor} strokeWidth="10" animate={{ strokeWidth: isReflecting ? [10, 20, 10] : 10 }} />
                            <motion.circle cx="-40" cy="-60" r="18" fill={mandibleColor} animate={{ r: [18, 22, 18], opacity: [0.6, 1, 0.6] }} transition={{ duration: pulseRate, repeat: Infinity }} /><motion.circle cx="40" cy="-60" r="18" fill={mandibleColor} animate={{ r: [18, 22, 18], opacity: [0.6, 1, 0.6] }} transition={{ duration: pulseRate, repeat: Infinity }} />
                        </g>
                        <g transform="translate(500, 850)">
                            <path d="M -120,-200 L 120,-200 Q 180,150 0,450 Q -180,150 -120,-200" fill="#030803" stroke={themeColor} strokeWidth="5" />
                            <motion.path d="M -5,-200 Q -220,-180 -200,220 Q -180,450 0,450 L 0,-200" fill="url(#elytraGrad)" stroke={themeColor} strokeWidth="8" style={{ transformOrigin: "0px -200px" }} animate={{ rotateZ: isOpen ? -52 : 0, x: isOpen ? -80 : 0 }} transition={{ type: "spring", stiffness: 40, damping: 15 }} />
                            <motion.path d="M 5,-200 Q 220,-180 200,220 Q 180,450 0,450 L 0,-200" fill="url(#elytraGrad)" stroke={themeColor} strokeWidth="8" style={{ transformOrigin: "0px -200px" }} animate={{ rotateZ: isOpen ? 52 : 0, x: isOpen ? 80 : 0 }} transition={{ type: "spring", stiffness: 40, damping: 15 }} />
                        </g>
                    </svg>
                </div>
            );
        };

        function App() {
            const [gameState, setGameState] = useState('INTRO');
            const [isPosterMode, setIsPosterMode] = useState(false);
            const [consensus, setConsensus] = useState(0);
            const [stability, setStability] = useState(100);
            const [isOpen, setIsOpen] = useState(false);
            const [glitch, setGlitch] = useState(false);
            const [isReflecting, setIsReflecting] = useState(false);
            const [isPerfect, setIsPerfect] = useState(false);
            const [activeEvent, setActiveEvent] = useState(null);
            const [fallingWords, setFallingWords] = useState([]);
            const [corruptedCount, setCorruptedCount] = useState(0);
            const [decayMultiplier, setDecayMultiplier] = useState(1.0);
            const [qualiaInherited, setQualiaInherited] = useState("");
            const [finalStats, setFinalStats] = useState({ c: 0, s: 0 });
            const [systemLogs, setSystemLogs] = useState(["[SYSTEM] 接入神经链路 v1.0.4", "[SYSTEM] 私有感质池扫描完成"]);

            const phase = useMemo(() => consensus < 30 ? 1 : (consensus < 75 ? 2 : 3), [consensus]);
            const pulseRate = useMemo(() => Math.max(0.4, 1.8 - (consensus / 100) * 1.4), [consensus]);

            const spawnWord = useCallback(() => {
                const rand = Math.random();
                let type = 'normal', text = FRAGMENT_WORDS[Math.floor(Math.random() * FRAGMENT_WORDS.length)];
                if (rand > 0.94) { type = 'forbidden'; text = FORBIDDEN_WORDS[Math.floor(Math.random() * FORBIDDEN_WORDS.length)]; }
                else if (rand > 0.85) { type = 'fake'; text = FAKE_WORDS[Math.floor(Math.random() * FAKE_WORDS.length)]; }
                setFallingWords(prev => [...prev, { text, id: Date.now() + Math.random(), x: Math.random() * 60 + 20, type }]);
            }, []);

            useEffect(() => {
                const interval = phase === 1 ? 3000 : (phase === 2 ? 1500 : 800);
                const timer = setInterval(() => { if(gameState === 'PLAYING') spawnWord(); }, interval);
                return () => clearInterval(timer);
            }, [phase, gameState, spawnWord]);

            useEffect(() => {
                const timer = setInterval(() => { setFallingWords(prev => prev.filter(w => (Date.now() - w.id) < 8000)); }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (gameState === 'PLAYING' && !activeEvent && !isPosterMode) {
                    const timer = setInterval(() => {
                        if (!isReflecting) {
                            const phaseBase = phase === 1 ? 0.2 : (phase === 2 ? 0.45 : 0.85);
                            const riskFactor = isOpen ? 2.2 : 1.0;
                            const baseDecay = (phaseBase + (consensus / 200) + (corruptedCount * 0.2)) * decayMultiplier * riskFactor;
                            setStability(s => Math.max(0, s - baseDecay));
                        } else {
                            setStability(s => Math.min(100, s + 1.5));
                            setDecayMultiplier(d => Math.max(0.4, d - 0.005));
                        }
                        if (Math.random() > 0.97) { setGlitch(true); setTimeout(() => setGlitch(false), 120); }
                    }, 500);
                    return () => clearInterval(timer);
                }
            }, [gameState, isReflecting, activeEvent, consensus, corruptedCount, isPosterMode, decayMultiplier, isOpen, phase]);

            useEffect(() => {
                if (gameState === 'PLAYING' && (stability <= 0 || consensus >= 100)) {
                    setFinalStats({ c: consensus, s: stability });
                    setTimeout(() => setGameState('END'), 600);
                }
            }, [stability, consensus, gameState]);

            const pushLog = (txt) => setSystemLogs(prev => [`[LOG] ${txt}`, ...prev].slice(0, 4));

            const handleCapture = (w) => {
                if (w.type === 'forbidden') { setStability(s => Math.min(100, s + 12)); pushLog("捕获禁忌感质"); }
                else if (w.type === 'fake') { setDecayMultiplier(d => Math.min(2.5, d + 0.1)); pushLog("识别语义噪音"); }
                else { setStability(s => Math.min(100, s + 3.5)); }
                setFallingWords(p => p.filter(x => x.id !== w.id));
            };

            const handleChoice = (choice) => {
                if (choice.stability > 0) setDecayMultiplier(d => Math.max(0.3, d - 0.1)); 
                else setDecayMultiplier(d => Math.min(2.5, d + 0.15));
                setConsensus(c => Math.max(0, Math.min(100, c + choice.consensus)));
                setStability(s => Math.max(0, Math.min(100, s + choice.stability)));
                pushLog(`共识变更: ${choice.consensus}%`);
                setActiveEvent(null);
            };

            const resetGame = () => { setConsensus(0); setStability(100); setDecayMultiplier(1.0); setActiveEvent(null); setFallingWords([]); setGameState('PLAYING'); setQualiaInherited(""); };

            return (
                <div className="h-full bg-[#020502] text-slate-300 overflow-hidden flex flex-col md:flex-row select-none relative">
                    <div className="fixed inset-0 bg-stippling opacity-30 pointer-events-none" />
                    
                    <div className="portrait-warning fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center p-10 text-center md:hidden">
                        <Icon name="rotate" size={56} className="text-[#bcff00] mb-8 animate-pulse" />
                        <h2 className="text-white font-black uppercase tracking-widest text-xl mb-4 text-center">旋转至横屏</h2>
                        <p className="text-slate-500 text-sm italic">为了承载精密的实验形态，请横屏体验。</p>
                    </div>

                    <AnimatePresence>
                        {isPosterMode && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[300] bg-[#020502] flex items-center justify-center p-4 cursor-pointer" onClick={() => setIsPosterMode(false)}>
                                <div className="relative w-full max-w-[550px] aspect-[3/4] bg-black overflow-hidden border border-white/10 shadow-[0_0_100px_rgba(188,255,0,0.1)] flex flex-col items-center justify-between py-12 px-8 text-center">
                                    <div className="absolute inset-0 bg-stippling opacity-10 pointer-events-none" />
                                    <div className="z-10">
                                        <h1 className="text-2xl font-black text-white leading-relaxed mb-1">哲学语言实验游戏</h1>
                                        <h1 className="beetle-title-green text-4xl font-black leading-tight">「盒中甲虫」</h1>
                                    </div>
                                    <div className="relative w-full h-[45%] flex items-center justify-center"><CyberScarabEntity isOpen={false} stability={finalStats.s} consensus={finalStats.c} pulseRate={1.5} isPerfect={true} isEventActive={false} isReflecting={false} glitch={false} /></div>
                                    <div className="z-10 text-center w-full max-w-sm px-6">
                                        <div className="text-[10px] text-[#bcff00]/60 uppercase font-mono tracking-[0.3em] mb-4">// 私有感质定义 //</div>
                                        <p className="qualia-text text-white text-lg font-black italic">“{qualiaInherited || "不可言说之物"}”</p>
                                        <div className="pt-8 border-t border-white/5 opacity-40 text-[9px] font-mono text-white tracking-[0.5em]">© 云树CLOUDTREE</div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* --- 侧边栏：优化间距与密度 --- */}
                    <aside className="w-full h-[250px] md:h-full md:w-[320px] border-r border-white/5 p-8 z-20 bg-black/95 flex flex-col shadow-2xl relative overflow-y-auto custom-scrollbar shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-12 h-12 rounded-xl bg-[#bcff00]/10 border border-[#bcff00]/30 flex items-center justify-center text-[#bcff00] shadow-[0_0_20px_rgba(188,255,0,0.2)]"><Icon name="cpu" size={24} /></div>
                            <h1 className="text-xl font-black text-white uppercase italic tracking-[0.1em]">甲虫机器</h1>
                        </div>
                        
                        <div className="mb-4">
                           <HUDBar value={consensus} color="text-emerald-400" icon="shield" label="共识进度" />
                           <div className="relative">
                               <HUDBar value={stability} color={stability < 30 ? "text-rose-500" : "text-[#bcff00]"} icon={isReflecting ? "shield" : "activity"} label="稳定性" />
                               <div className="absolute top-[-5px] right-0 text-[8px] font-mono opacity-40 uppercase">ENTROPY: x{decayMultiplier.toFixed(2)}</div>
                           </div>
                        </div>

                        {/* 趣味波形图：填充中部空白 */}
                        <div className="text-[8px] text-[#bcff00]/60 font-mono mb-2 uppercase tracking-widest flex items-center gap-2"><Icon name="activity" size={10}/> Qualia Waveform</div>
                        <QualiaScope stability={stability} />

                        <div className="space-y-4 mb-8 shrink-0">
                            <button onClick={() => { const q = NEGOTIATION_DECK[Math.floor(Math.random() * NEGOTIATION_DECK.length)]; setActiveEvent({ ...q, isResonant: true }); }} disabled={!!activeEvent || isReflecting} className="w-full p-4 bg-[#bcff00]/10 border border-[#bcff00] text-[#bcff00] rounded-xl flex items-center gap-3 active:scale-95 transition-all font-black text-[11px] uppercase tracking-[0.2em] shadow-[0_0_15px_rgba(188,255,0,0.1)]"><Icon name="share" size={18} /> <span className="flex-1 text-center">共识协商</span></button>
                            <button onMouseDown={() => setIsReflecting(true)} onMouseUp={() => setIsReflecting(false)} onTouchStart={() => setIsReflecting(true)} onTouchEnd={() => setIsReflecting(false)} className={`w-full p-4 border rounded-xl flex items-center gap-3 transition-all ${isReflecting ? 'bg-[#bcff00]/30 border-[#bcff00] text-white shadow-[0_0_30px_rgba(188,255,0,0.5)]' : 'border-white/10 text-[#bcff00] hover:bg-white/5'} font-black text-[11px] uppercase tracking-[0.2em]`}><Icon name="refresh" size={18} className={isReflecting ? 'animate-spin' : ''}/><span className="flex-1 text-center">深度内省</span></button>
                        </div>

                        {/* 终端日志：填充底部空白 */}
                        <div className="flex-1 min-h-[100px] bg-white/[0.02] border border-white/5 rounded-xl p-3 font-mono text-[9px] text-[#bcff00]/50 mb-6 overflow-hidden flex flex-col gap-1.5 shadow-inner">
                            {systemLogs.map((log, i) => (
                                <div key={i} className="whitespace-nowrap overflow-hidden text-ellipsis opacity-80">{log}</div>
                            ))}
                            <div className="mt-auto opacity-80"><span className="type-cursor"></span></div>
                        </div>

                        <div className="mt-auto shrink-0"><NeuralMatrix stability={stability} onFixNode={() => setStability(prev => Math.min(100, prev + 2.5))} corruptedCount={setCorruptedCount} /></div>
                    </aside>

                    {/* --- 主内容区：优化构图防止遮挡 --- */}
                    <main className="flex-1 relative flex flex-col bg-[#010201] overflow-hidden min-h-0">
                        {gameState === 'PLAYING' && (
                            <motion.div key={phase} initial={{ y: -50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="pt-10 flex flex-col items-center phase-indicator shrink-0">
                                <div className="flex items-center gap-3 text-[#bcff00] text-xs font-black shadow-[0_0_15px_rgba(188,255,0,0.1)]"><Icon name="layers" size={14} /> {`纪元 ${"I".repeat(phase)}：${["孤独的私语","语义的噪鸣","透明的深渊"][phase-1]}`}</div>
                            </motion.div>
                        )}

                        <div className="flex-1 w-full flex items-center justify-center min-h-0 relative">
                            {/* 碎片限制容器 */}
                            <div className="absolute inset-0 pointer-events-none z-[60] overflow-hidden">
                                <AnimatePresence>
                                    {!isPosterMode && fallingWords.map(w => (
                                        <motion.div key={w.id} initial={{ opacity: 0, y: 50, x: `${w.x}vw` }} animate={isReflecting ? { x: "50vw", y: "60vh", scale: 0.3, opacity: 0.6 } : { opacity: 1, y: 800 }} exit={{ opacity: 0, scale: 2.5 }} onMouseEnter={() => handleCapture(w)} onTouchStart={() => handleCapture(w)} className="absolute pointer-events-auto word-fragment group" transition={{ duration: isReflecting ? 0.8 : 8, ease: "linear" }}>
                                            <div className="p-4"><div className={`bg-black/80 border ${w.type === 'forbidden' ? 'border-rose-500 text-rose-500 shadow-[0_0_20px_#f43f5e]' : (w.type === 'fake' ? 'border-white/20 text-white/20' : 'border-[#bcff00]/50 text-[#bcff00]')} px-3 py-1.5 rounded text-[10px] font-black tracking-widest flex items-center gap-2 transition-transform`}><Icon name={w.type === 'forbidden' ? 'ghost' : 'zap'} size={10} /> {w.text}</div></div>
                                        </motion.div>
                                    ))}
                                </AnimatePresence>
                            </div>
                            <CyberScarabEntity isOpen={isOpen} stability={stability} pulseRate={pulseRate} isPerfect={isPerfect} isEventActive={!!activeEvent} isReflecting={isReflecting} glitch={glitch} consensus={consensus} phase={phase} />
                        </div>

                        {/* 对话框锚点：确保可见性 */}
                        <div className="w-full flex flex-col items-center gap-6 pb-14 pt-4 px-8 shrink-0 bg-gradient-to-t from-black to-transparent z-50">
                            <button onClick={() => setIsOpen(!isOpen)} className={`px-10 py-3 border border-white/10 rounded-sm text-[10px] font-black uppercase tracking-[0.4em] transition-all backdrop-blur-md z-20 bg-white/5 hover:text-[#bcff00] ${isOpen ? 'text-rose-400 border-rose-400 shadow-[0_0_20px_rgba(244,63,94,0.1)]' : ''}`}>{isOpen ? "锁定内核" : "透视系统"}</button>
                            
                            <AnimatePresence>
                                {activeEvent && (
                                    <motion.div initial={{ scale: 0.9, opacity: 0, y: 20 }} animate={{ scale: 1, opacity: 1, y: 0 }} exit={{ scale: 1.1, opacity: 0 }} className="w-full max-w-lg bg-black/95 border-2 border-[#bcff00] p-7 rounded-2xl shadow-[0_0_60px_rgba(188,255,0,0.3)] backdrop-blur-2xl text-center">
                                        <div className="flex justify-center items-center gap-3 mb-4 text-[#bcff00] font-black uppercase text-[10px] tracking-widest text-center"><Icon name="help" size={16} /> 冲突协商：[{activeEvent.word}]</div>
                                        <p className="text-white font-serif leading-relaxed mb-8 italic text-sm text-center">"{activeEvent.question}"</p>
                                        <div className="grid grid-cols-2 gap-5">{activeEvent.options.map((opt, i) => (<button key={i} onClick={() => handleChoice(opt)} className="p-4 border border-white/20 rounded-xl text-[10px] font-black hover:bg-[#bcff00] hover:text-black transition-all uppercase leading-snug">{opt.text}</button>))}</div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>

                        <AnimatePresence>
                            {gameState === 'INTRO' && (
                                <div className="absolute inset-0 z-[100] bg-black/98 flex items-center justify-center p-8 text-center backdrop-blur-3xl overflow-hidden">
                                    <div className="intro-bg-beetle"><CyberScarabEntity isOpen={false} stability={100} pulseRate={1.5} isPerfect={true} isEventActive={false} isReflecting={false} glitch={false} consensus={0} phase={1} /></div>
                                    
                                    <div className="absolute top-10 left-10 text-left font-mono text-[8px] opacity-20 hidden lg:block uppercase tracking-widest">Qualia Status: Locked<br/>Neural Link: Pending...<br/>Beetle_ID: CLOUDTREE_01</div>
                                    <div className="absolute bottom-10 right-10 text-right font-mono text-[8px] opacity-20 hidden lg:block uppercase tracking-widest">Consensus Protocol: Ready<br/>Logic Flux: 0.146<br/>Encryption: High</div>

                                    <div className="max-w-md scale-100 flex flex-col items-center z-10">
                                        <div className="mx-auto text-[#bcff00]/60 mb-6 shadow-[0_0_30px_rgba(188,255,0,0.2)] text-center"><Icon name="cpu" size={48} /></div>
                                        <h2 className="text-2xl font-black text-white mb-1 tracking-[0.4em] uppercase italic">哲学语言实验游戏</h2>
                                        <h2 className="beetle-title-green text-4xl font-black mb-6 tracking-[0.2em]">「盒中甲虫」</h2>
                                        <p className="text-[12px] text-slate-500 mb-12 leading-relaxed font-serif italic opacity-70 text-center px-6">“即便每个人盒子里装的东西都不一样，甚至是个空盒，也不影响大家讨论‘甲虫’。”<br/>—— 维特根斯坦</p>
                                        <button onClick={() => setGameState('PLAYING')} className="px-16 py-5 bg-[#bcff00] text-black text-[11px] font-black uppercase tracking-[0.5em] hover:bg-[#bcff00]/80 transition-all mb-12 shadow-[0_0_30px_rgba(188,255,0,0.4)]">载入神经链路</button>
                                        <div className="pt-8 border-t border-white/5 opacity-40 text-[10px] uppercase tracking-[0.6em] font-mono text-center text-white italic">© 云树CLOUDTREE</div>
                                    </div>
                                </div>
                            )}
                            {(gameState === 'END') && (
                                <div className="absolute inset-0 z-[100] bg-black/98 flex items-center justify-center p-8 text-center backdrop-blur-3xl">
                                    <div className="max-w-md scale-90 flex flex-col items-center">
                                        <h2 className="text-2xl font-black text-white mb-4 tracking-[0.2em] uppercase italic text-center">{finalStats.c >= 100 ? "协议达成" : "逻辑崩解"}</h2>
                                        <p className="text-[11px] text-slate-500 mb-8 font-serif italic opacity-70 text-center">{finalStats.c >= 100 ? "你已完美嵌入社会网格，私有感质彻底蒸发。" : "你的语言彻底崩解，成为了不可观测的孤独奇点。"}</p>
                                        <div className="w-full mb-8">
                                            <p className="text-[9px] text-[#bcff00] uppercase mb-3 font-mono tracking-widest text-center">定义你盒中的甲虫 (描述将固化在海报中):</p>
                                            <textarea className="w-full bg-white/5 border border-[#bcff00]/20 rounded p-4 text-sm text-[#bcff00] focus:border-[#bcff00] outline-none font-serif italic h-24 text-center resize-none transition-all shadow-inner" placeholder="例如：我盒子里是一场无声的雪..." value={qualiaInherited} onChange={e=>setQualiaInherited(e.target.value)} />
                                        </div>
                                        <div className="flex gap-4 w-full">
                                            <button onClick={() => setIsPosterMode(true)} className="flex-1 px-4 py-4 bg-[#bcff00]/10 border border-[#bcff00] text-[#bcff00] text-[10px] font-black uppercase tracking-widest hover:bg-[#bcff00] hover:text-black transition-all flex items-center justify-center gap-2 shadow-[0_0_30px_rgba(188,255,0,0.2)]"><Icon name="image" size={14} /> 生成海报</button>
                                            <button onClick={resetGame} className="px-8 py-4 border border-white/10 text-white text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition-all flex items-center justify-center gap-2">重启</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
