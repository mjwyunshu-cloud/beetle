<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语言游戏：甲虫机器 (PC FINAL STABLE)</title>
    <!-- 核心库 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');

        body { 
            background-color: #020502; 
            margin: 0; 
            overflow: hidden; 
            color: #cbd5e1; 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100vh;
            width: 100vw;
        }
        #root { height: 100%; width: 100%; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(188, 255, 0, 0.4); border-radius: 10px; }
        
        /* 关键修复：防止数字跳动 */
        .tabular-nums { font-variant-numeric: tabular-nums; min-width: 3.5ch; text-align: right; display: inline-block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // --- 全局样式 ---
        const GlobalStyle = () => (
            <style dangerouslySetInnerHTML={{ __html: `
                @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
                @keyframes scanner-line { 0% { top: -10%; } 100% { top: 110%; } }
                .bg-stippling { background-image: radial-gradient(#bcff00 0.8px, transparent 0.8px); background-size: 8px 8px; }
                .cyber-glitch-active { animation: jitter 0.1s linear infinite; }
                @keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(-3px, 2px); } 100% { transform: translate(0,0); } }
                
                .word-fragment { text-shadow: 0 0 15px #bcff00; cursor: crosshair; user-select: none; }
                
                .beetle-title-green { 
                    color: #bcff00 !important; 
                    text-shadow: 0 0 35px rgba(188, 255, 0, 0.6), 0 0 10px rgba(188, 255, 0, 0.4); 
                    letter-spacing: 0.3em !important; 
                    font-weight: 900 !important;
                }

                .type-cursor { animation: blink 1s infinite; border-left: 2px solid #bcff00; margin-left: 2px; }
                @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

                .intro-beetle-bg {
                    position: absolute;
                    inset: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    opacity: 0.12;
                    pointer-events: none;
                    z-index: 0;
                }
            ` }} />
        );

        const Icon = ({ name, size = 16, className = "" }) => (
            <span className={className} style={{ width: size, height: size, display: 'inline-block' }}>
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {name === 'cpu' && <path d="M4 7V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z M9 2v2 M15 2v2 M9 20v2 M15 20v2 M2 9h2 M2 15h2 M20 9h2 M20 15h2" />}
                    {name === 'share' && <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8 M16 6l-4-4-4 4 M12 2v13" />}
                    {name === 'activity' && <path d="M22 12h-4l-3 9L9 3l-3 9H2" />}
                    {name === 'refresh' && <path d="M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />}
                    {name === 'help' && <React.Fragment><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3 M12 17h.01" /></React.Fragment>}
                    {name === 'shield' && <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />}
                    {name === 'zap' && <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />}
                    {name === 'image' && <React.Fragment><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></React.Fragment>}
                    {name === 'layers' && <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />}
                    {name === 'book' && <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15z" />}
                </svg>
            </span>
        );

        // --- 核心题库 ---
        const NEGOTIATION_DECK = [
            { id: 'n1', word: "PRIVATE", question: "如果一个人的‘痛’是完全私人的，那‘痛’这个词如何能被另一个人理解？", options: [{ text: "通过社会规训同构", consensus: 12, stability: -15 }, { text: "无法理解只是模仿", consensus: -8, stability: 15 }] },
            { id: 'n2', word: "BEETLE", question: "如果每个人手里都有一个永远不准示人的盒子，里面真的有‘甲虫’吗？", options: [{ text: "名字本身就是存在", consensus: 18, stability: -20 }, { text: "虚无，只是语言游戏", consensus: -5, stability: 10 }] },
            { id: 'n3', word: "LOGIC", question: "逻辑是世界的骨架，还是仅仅是我们观察世界的眼镜？", options: [{ text: "客观的逻辑骨架", consensus: 14, stability: -10 }, { text: "主观的观察眼镜", consensus: -5, stability: 18 }] },
            { id: 'n4', word: "SILENCE", question: "‘对于不可言说之物，必须保持沉默。’你现在是否感觉到了某种不可言说的痛？", options: [{ text: "遵从禁令保持沉默", consensus: -10, stability: 25 }, { text: "试图定义强行言说", consensus: 15, stability: -20 }] },
            { id: 'n5', word: "RULES", question: "遵循规则是‘盲目地’进行的吗？", options: [{ text: "是的，这是一种习俗", consensus: 12, stability: -10 }, { text: "不，我在创造新规则", consensus: -20, stability: 25 }] },
            { id: 'n6', word: "GAME", question: "所有的‘游戏’都有共同点吗？还是仅仅只有‘家族相似性’？", options: [{ text: "存在共同的定义", consensus: 15, stability: -15 }, { text: "只有家族相似性", consensus: -5, stability: 20 }] },
            { id: 'n7', word: "FLY", question: "哲学的目的是向苍蝇展示飞出捕蝇瓶的出路吗？", options: [{ text: "是的，寻求逻辑解脱", consensus: 12, stability: -10 }, { text: "不，瓶中才是真实", consensus: -15, stability: 25 }] },
            { id: 'n8', word: "LADDER", question: "一旦你顺着逻辑的梯子爬了上去，你是否应该把这把梯子扔掉？", options: [{ text: "扔掉，那是无意义的", consensus: 20, stability: -30 }, { text: "保留，它是认知的根", consensus: -10, stability: 15 }] },
            { id: 'n10', word: "LIMIT", question: "我语言的界限是否意味着我世界的界限？", options: [{ text: "世界即是可言说之物", consensus: 18, stability: -25 }, { text: "存在无法言说的溢出", consensus: -12, stability: 30 }] },
            { id: 'n19', word: "BOX", question: "如果盒子是空的，但大家都决定表现得像是有甲虫，这是否等同于‘有甲虫’？", options: [{ text: "等同，意义在于行为", consensus: 20, stability: -20 }, { text: "不等同，真理不容欺骗", consensus: -20, stability: 30 }] }
        ];

        const FRAGMENT_WORDS = ["LOGIC", "TRUTH", "MEANING", "GAME", "USE", "RULES", "WORLD", "LIMIT"];

        const QualiaScope = ({ stability }) => {
            const [points, setPoints] = useState(Array(30).fill(20));
            useEffect(() => {
                const timer = setInterval(() => {
                    setPoints(prev => [...prev.slice(1), Math.random() * (100 - stability) / 1.5 + 8]);
                }, 100);
                return () => clearInterval(timer);
            }, [stability]);
            return (
                <div className="w-full h-16 bg-white/[0.03] border border-white/10 rounded-2xl flex items-end gap-1 px-3 py-2 overflow-hidden mb-8 shadow-inner">
                    {points.map((p, i) => <div key={i} className="flex-1 bg-[#bcff00]/50 rounded-t-[1.5px]" style={{ height: `${p}%`, transition: 'height 0.1s ease' }} />)}
                </div>
            );
        };

        const CyberScarabEntity = ({ isOpen, stability, pulseRate, isEventActive, isReflecting, glitch, isContext }) => {
            const themeColor = isEventActive ? "#bcff00" : (stability < 30 ? "#ff3366" : "#bcff00");
            const mandibleColor = "#ff2200";
            
            // 比例调节：首页居中适中，游戏内缩小腾位置
            let scaleClass = "scale-[0.55] md:scale-[0.65]";
            if (isContext === 'INTRO') scaleClass = "scale-[0.7]";
            if (isContext === 'POSTER') scaleClass = "scale-[0.6]";

            return (
                <div className={`relative w-full h-full flex items-center justify-center pointer-events-none transition-all duration-1000 ${scaleClass}`}>
                    <AnimatePresence>{isReflecting && (<motion.div initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1.2, opacity: 1 }} exit={{ scale: 1.8, opacity: 0 }} className="absolute z-0"><svg width="600" height="600" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#bcff00" strokeWidth="0.5" opacity="0.3" style={{ transformOrigin: 'center', animation: 'pulse-ring 2s infinite' }} /></svg></motion.div>)}</AnimatePresence>
                    <svg viewBox="0 0 1000 1400" className={`w-full max-w-full h-full drop-shadow-[0_0:50px_rgba(188,255,0,0.2)] transition-all duration-700 ${glitch ? 'cyber-glitch-active' : ''}`}>
                        <defs>
                            <linearGradient id="elytraGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#0a120a" /><stop offset="50%" stopColor="#1a2a1a" /><stop offset="100%" stopColor="#0a120a" /></linearGradient>
                            <linearGradient id="mandGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor="#ff9999" /><stop offset="100%" stopColor={mandibleColor} /></linearGradient>
                        </defs>
                        <g stroke={themeColor} strokeWidth="4" fill="none" opacity="0.6">
                            {[1, -1].map(side => (
                                <g key={`side-${side}`} transform={`translate(500, 850) scale(${side}, 1)`}>
                                    <motion.path d="M 30,-250 L 140,-450 L 290,-420 L 400,-600 L 450,-700" />
                                    <circle cx="140" cy="-450" r="8" fill={themeColor} />
                                    <path d="M 450,-700 L 420,-740 M 450,-700 L 490,-720" strokeWidth="2.5" />
                                    <path d="M 60,-50 L 280,-100 L 380,-50 L 440,100" /><path d="M 40,250 L 220,400 L 350,550 L 320,620" />
                                </g>
                            ))}
                        </g>
                        <g transform="translate(500, 580)">
                            <motion.path d="M 45,0 C 160,-180 280,-280 280,-420 C 280,-520 210,-560 140,-500 C 230,-460 240,-300 110,-120 L 45,0" fill="url(#mandGrad)" stroke="rgba(255,255,255,0.4)" strokeWidth="2" animate={{ rotate: isEventActive ? [0, 20, 0] : [0, 2, 0] }} style={{ transformOrigin: "0px 0px" }} />
                            <motion.path d="M -45,0 C -160,-180 -280,-280 -280,-420 C -280,-520 -210,-560 -140,-500 C -230,-460 -240,-300 -110,-120 L -45,0" fill="url(#mandGrad)" stroke="rgba(255,255,255,0.4)" strokeWidth="2" animate={{ rotate: isEventActive ? [0, -20, 0] : [0, -2, 0] }} style={{ transformOrigin: "0px 0px" }} />
                        </g>
                        <g transform="translate(500, 620)">
                            <motion.rect x="-80" y="-120" width="160" height="150" rx={30} fill="#050a05" stroke={themeColor} strokeWidth="10" animate={{ strokeWidth: isReflecting ? [10, 20, 10] : 10 }} />
                            <motion.circle cx="-40" cy="-60" r="18" fill={mandibleColor} animate={{ r: [18, 22, 18], opacity: [0.6, 1, 0.6] }} transition={{ duration: pulseRate, repeat: Infinity }} /><motion.circle cx="40" cy="-60" r="18" fill={mandibleColor} animate={{ r: [18, 22, 18], opacity: [0.6, 1, 0.6] }} transition={{ duration: pulseRate, repeat: Infinity }} />
                        </g>
                        <g transform="translate(500, 850)">
                            <path d="M -120,-200 L 120,-200 Q 180,150 0,450 Q -180,150 -120,-200" fill="#030803" stroke={themeColor} strokeWidth="5" />
                            <motion.path d="M -5,-200 Q -220,-180 -200,220 Q -180,450 0,450 L 0,-200" fill="url(#elytraGrad)" stroke={themeColor} strokeWidth="8" style={{ transformOrigin: "0px -200px" }} animate={{ rotateZ: isOpen ? -52 : 0, x: isOpen ? -80 : 0 }} transition={{ type: "spring", stiffness: 40, damping: 15 }} />
                            <motion.path d="M 5,-200 Q 220,-180 200,220 Q 180,450 0,450 L 0,-200" fill="url(#elytraGrad)" stroke={themeColor} strokeWidth="8" style={{ transformOrigin: "0px -200px" }} animate={{ rotateZ: isOpen ? 52 : 0, x: isOpen ? 80 : 0 }} transition={{ type: "spring", stiffness: 40, damping: 15 }} />
                        </g>
                    </svg>
                </div>
            );
        };

        function App() {
            const [gameState, setGameState] = useState('INTRO');
            const [isPosterMode, setIsPosterMode] = useState(false);
            const [showWittgenstein, setShowWittgenstein] = useState(false);
            const [consensus, setConsensus] = useState(0);
            const [stability, setStability] = useState(100);
            const [isOpen, setIsOpen] = useState(false);
            const [glitch, setGlitch] = useState(false);
            const [isReflecting, setIsReflecting] = useState(false);
            const [activeEvent, setActiveEvent] = useState(null);
            const [fallingWords, setFallingWords] = useState([]);
            const [decayMultiplier, setDecayMultiplier] = useState(1.0);
            const [qualiaInherited, setQualiaInherited] = useState("");
            const [finalStats, setFinalStats] = useState({ c: 0, s: 0 });
            const [systemLogs, setSystemLogs] = useState(["[SYSTEM] 接入神经链路 v1.0.4", "[SYSTEM] 私有感质池扫描完成"]);
            
            // 神经矩阵状态逻辑修复
            const [matrixNodes, setMatrixNodes] = useState(Array(20).fill(0).map((_, i) => ({ corrupted: Math.random() > 0.85, id: i })));
            const corruptedCount = useMemo(() => matrixNodes.filter(n => n.corrupted).length, [matrixNodes]);

            const lastQuestionIdx = useRef(-1);
            const phase = useMemo(() => consensus < 30 ? 1 : (consensus < 75 ? 2 : 3), [consensus]);
            const pulseRate = useMemo(() => Math.max(0.4, 1.8 - (consensus / 100) * 1.4), [consensus]);

            const drawQuestion = () => {
                let nextIdx;
                do { nextIdx = Math.floor(Math.random() * NEGOTIATION_DECK.length); } while (nextIdx === lastQuestionIdx.current);
                lastQuestionIdx.current = nextIdx;
                setActiveEvent(NEGOTIATION_DECK[nextIdx]);
            };

            const spawnWord = useCallback(() => {
                setFallingWords(prev => [...prev, { text: FRAGMENT_WORDS[Math.floor(Math.random() * FRAGMENT_WORDS.length)], id: Date.now() + Math.random(), x: Math.random() * 50 + 25 }]);
            }, []);

            useEffect(() => {
                const interval = phase === 1 ? 3000 : (phase === 2 ? 1500 : 800);
                const timer = setInterval(() => { if(gameState === 'PLAYING' && !activeEvent) spawnWord(); }, interval);
                return () => clearInterval(timer);
            }, [phase, gameState, spawnWord, activeEvent]);

            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                const timer = setInterval(() => {
                    const corruptionChance = (100 - stability) / 400;
                    setMatrixNodes(prev => prev.map(n => n.corrupted ? n : (Math.random() < corruptionChance ? { ...n, corrupted: true } : n)));
                }, 2000);
                return () => clearInterval(timer);
            }, [gameState, stability]);

            useEffect(() => {
                if (gameState === 'PLAYING' && !activeEvent && !isPosterMode) {
                    const timer = setInterval(() => {
                        if (!isReflecting) {
                            const baseDecay = (0.3 + (consensus / 200) + (corruptedCount * 0.15)) * decayMultiplier * (isOpen ? 2.2 : 1.0);
                            setStability(s => Math.max(0, s - baseDecay));
                        } else {
                            setStability(s => Math.min(100, s + 1.8));
                            setDecayMultiplier(d => Math.max(0.4, d - 0.005));
                        }
                    }, 500);
                    return () => clearInterval(timer);
                }
            }, [gameState, isReflecting, activeEvent, consensus, corruptedCount, isPosterMode, decayMultiplier, isOpen]);

            useEffect(() => {
                if (gameState === 'PLAYING' && (stability <= 0 || consensus >= 100)) {
                    setFinalStats({ c: consensus, s: stability });
                    setTimeout(() => setGameState('END'), 600);
                }
            }, [stability, consensus, gameState]);

            const pushLog = (txt) => setSystemLogs(prev => [`[LOG] ${txt}`, ...prev].slice(0, 5));

            const handleCapture = (w) => {
                setStability(s => Math.min(100, s + 3.5));
                setFallingWords(p => p.filter(x => x.id !== w.id));
            };

            const handleChoice = (choice) => {
                setConsensus(c => Math.max(0, Math.min(100, c + choice.consensus)));
                setStability(s => Math.max(0, Math.min(100, s + choice.stability)));
                pushLog(`共识变更: ${choice.consensus}%`);
                setActiveEvent(null);
            };

            const fixMatrixNode = (id) => {
                setMatrixNodes(prev => prev.map(n => n.id === id ? { ...n, corrupted: false } : n));
                setStability(s => Math.min(100, s + 3.5));
                pushLog("逻辑维修完成 (+3.5%)");
            };

            const resetGame = () => { setConsensus(0); setStability(100); setDecayMultiplier(1.0); setActiveEvent(null); setFallingWords([]); setGameState('PLAYING'); setQualiaInherited(""); setShowWittgenstein(false); setIsPosterMode(false); setMatrixNodes(Array(20).fill(0).map((_, i) => ({ corrupted: false, id: i }))); };

            const HUDBar = ({ value, color, icon, label }) => (
                <div className="mb-6 relative w-full">
                    <div className="flex justify-between items-end mb-1.5 text-[11px] uppercase tracking-[0.25em] text-slate-400 font-mono">
                        <span className="flex items-center gap-2 font-black"><Icon name={icon} size={14} className={color} /> {label}</span>
                        <span className={`${color} text-xs font-black tabular-nums`}>{Math.floor(Math.max(0, Math.min(100, value)))}%</span>
                    </div>
                    <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden border border-white/10 shadow-inner">
                        <motion.div className={`h-full ${color.replace('text-', 'bg-')}`} initial={{ width: 0 }} animate={{ width: `${Math.min(100, Math.max(0, value))}%` }} />
                    </div>
                </div>
            );

            return (
                <div className="h-full w-full bg-[#020502] flex overflow-hidden select-none relative font-logic">
                    <GlobalStyle />
                    <div className="fixed inset-0 bg-stippling opacity-30 pointer-events-none" />

                    <aside className="w-[400px] h-full border-r border-white/10 p-10 z-20 bg-black/98 flex flex-col shadow-2xl shrink-0 custom-scrollbar overflow-y-auto">
                        <div className="flex items-center gap-5 mb-14">
                            <div className="w-14 h-14 rounded-2xl bg-[#bcff00]/10 border border-[#bcff00]/30 flex items-center justify-center text-[#bcff00] shadow-[0_0_20px_rgba(188,255,0,0.2)]"><Icon name="cpu" size={30} /></div>
                            <h1 className="text-2xl font-black text-white uppercase italic tracking-[0.15em]">甲虫机器</h1>
                        </div>
                        
                        <HUDBar value={consensus} color="text-emerald-400" icon="shield" label="共识进度" />
                        <HUDBar value={stability} color={stability < 30 ? "text-rose-500" : "text-[#bcff00]"} icon="activity" label="稳定性" />

                        <QualiaScope stability={stability} />

                        <div className="space-y-4 mb-8 mt-2">
                            <button onClick={drawQuestion} disabled={!!activeEvent || isReflecting} className="w-full py-4 bg-[#bcff00]/10 border border-[#bcff00] text-[#bcff00] rounded-xl flex items-center gap-4 active:scale-95 transition-all font-black text-[12px] uppercase tracking-[0.3em] hover:bg-[#bcff00]/20 shadow-[0_0_15px_rgba(188,255,0,0.1)]"><Icon name="share" size={20} /> <span className="flex-1 text-center">启动共识协商</span></button>
                            <button onMouseDown={() => setIsReflecting(true)} onMouseUp={() => setIsReflecting(false)} className={`w-full py-4 border rounded-xl flex items-center gap-4 transition-all ${isReflecting ? 'bg-[#bcff00]/30 border-[#bcff00] text-white shadow-[0_0:15px_rgba(188,255,0,0.2)]' : 'border-white/10 text-[#bcff00] hover:bg-white/5'} font-black text-[12px] uppercase tracking-[0.3em]`}><Icon name="refresh" size={20}/><span className="flex-1 text-center">长按深度内省</span></button>
                        </div>

                        <div className="flex-1 min-h-[120px] bg-white/[0.02] border border-white/5 rounded-2xl p-4 font-mono text-[10px] text-[#bcff00]/50 mb-6 overflow-hidden flex flex-col gap-2 shadow-inner uppercase">
                            {systemLogs.map((log, i) => (<div key={i} className="whitespace-nowrap overflow-hidden text-ellipsis opacity-80">{log}</div>))}
                            <div className="mt-auto opacity-80 font-black tracking-widest uppercase">>>> SYSTEM_RUNNING</div>
                        </div>

                        {/* --- 神经矩阵监控：实装逻辑与动效 --- */}
                        <div className="mt-auto pt-6 border-t border-white/10">
                            <div className="flex justify-between mb-3 px-1 text-[10px] font-mono font-black tracking-widest text-[#bcff00]/60 uppercase">
                                <div>神经矩阵维修</div><div className={corruptedCount > 5 ? 'text-rose-500 animate-pulse' : ''}>ERR: +{corruptedCount}%</div>
                            </div>
                            <div className="grid grid-cols-5 gap-2 p-3 bg-black/60 rounded-xl border border-white/10 relative overflow-hidden shadow-inner">
                                <div className="absolute inset-0 border-b border-[#bcff00]/5 pointer-events-none" style={{ animation: 'scanner-line 3s linear infinite' }} />
                                {matrixNodes.map((n) => (
                                    <div 
                                        key={n.id} 
                                        onClick={() => { if(n.corrupted) fixMatrixNode(n.id); }} 
                                        className={`h-3 rounded-sm transition-all duration-300 cursor-pointer ${n.corrupted ? 'bg-rose-500 shadow-[0_0:8px_#f43f5e] animate-pulse' : 'bg-white/5 hover:bg-white/10'}`} 
                                    />
                                ))}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 relative flex flex-col bg-[#010201] overflow-hidden min-h-0">
                        {gameState === 'PLAYING' && (
                            <motion.div initial={{ y: -50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="absolute top-10 left-1/2 -translate-x-1/2 z-50 text-[#bcff00] text-sm font-black uppercase tracking-[0.5em] flex items-center gap-4 py-2 px-6 border-x border-[#bcff00]/20">
                                <Icon name="layers" size={16} /> 纪元 {phase}: {["孤独的私语","语义的噪鸣","透明的深渊"][phase-1]}
                            </motion.div>
                        )}

                        <div className="flex-1 w-full flex flex-col items-center justify-center min-h-0 relative">
                            <AnimatePresence>
                                {!isPosterMode && fallingWords.map(w => (
                                    <motion.div key={w.id} initial={{ opacity: 0, y: 50, x: `${w.x}vw` }} animate={{ opacity: 1, y: 800 }} exit={{ opacity: 0, scale: 2.5 }} onMouseEnter={() => handleCapture(w)} className="absolute pointer-events-auto word-fragment" transition={{ duration: 8, ease: "linear" }}>
                                        <div className="p-4"><div className="bg-black/90 border border-[#bcff00]/60 text-[#bcff00] px-4 py-2 rounded-lg text-[11px] font-black tracking-widest shadow-2xl flex items-center gap-2 uppercase"><Icon name="zap" size={12} /> {w.text}</div></div>
                                    </motion.div>
                                ))}
                            </AnimatePresence>
                            
                            <div className="w-full h-full max-h-[60vh] flex items-center justify-center">
                                <CyberScarabEntity isOpen={isOpen} stability={stability} pulseRate={pulseRate} isEventActive={!!activeEvent} isReflecting={isReflecting} isContext={gameState} />
                            </div>

                            <div className="w-full flex flex-col items-center justify-center shrink-0 z-[50] mt-[-40px] min-h-[140px] pb-10">
                                <AnimatePresence mode="wait">
                                    {activeEvent ? (
                                        <motion.div key="event" initial={{ opacity: 0, scale: 0.95, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }} exit={{ opacity: 0, scale: 0.95, y: 10 }} className="w-full max-w-xl bg-black/95 border-2 border-[#bcff00] p-8 rounded-[2rem] shadow-[0_0:80px_rgba(188,255,0,0.3)] backdrop-blur-3xl text-center relative">
                                            <div className="flex justify-center items-center gap-4 mb-5 text-[#bcff00] font-black uppercase text-[12px] tracking-[0.3em]"><Icon name="help" size={20} /> 协议冲突协商: [{activeEvent.word}]</div>
                                            <p className="text-white font-serif leading-relaxed mb-8 italic text-base px-4">"{activeEvent.question}"</p>
                                            <div className="grid grid-cols-2 gap-5">{activeEvent.options.map((opt, i) => (<button key={i} onClick={() => handleChoice(opt)} className="py-4 border border-white/20 rounded-2xl text-[11px] font-black hover:bg-[#bcff00] hover:text-black transition-all uppercase tracking-widest shadow-xl">{opt.text}</button>))}</div>
                                        </motion.div>
                                    ) : (
                                        gameState === 'PLAYING' && <button onClick={() => setIsOpen(!isOpen)} className={`px-12 py-3.5 border border-white/10 rounded-lg text-[11px] font-black uppercase tracking-[0.5em] transition-all backdrop-blur-xl bg-white/5 hover:text-[#bcff00] ${isOpen ? 'text-rose-400 border-rose-400 shadow-[0_0:20px_rgba(244,63,94,0.15)]' : ''}`}>{isOpen ? "锁定核心系统" : "透视系统电路"}</button>
                                    )}
                                </AnimatePresence>
                            </div>
                        </div>

                        <AnimatePresence>
                            {gameState === 'INTRO' && (
                                <div className="absolute inset-0 z-[100] bg-black/98 flex flex-col items-center justify-center p-12 text-center backdrop-blur-3xl overflow-hidden">
                                    <div className="intro-beetle-bg">
                                        <CyberScarabEntity isOpen={false} stability={100} pulseRate={1.5} isContext="INTRO" />
                                    </div>
                                    <div className="max-w-2xl flex flex-col items-center z-10">
                                        <div className="mx-auto text-[#bcff00]/60 mb-8 shadow-[0_0:40px_rgba(188,255,0,0.2)]"><Icon name="cpu" size={60} /></div>
                                        <h2 className="text-2xl font-black text-white mb-2 tracking-[0.5em] uppercase italic">哲学语言实验游戏</h2>
                                        <h1 className="beetle-title-green text-6xl font-black mb-12 tracking-[0.25em] uppercase">「盒中甲虫」</h1>
                                        <p className="text-sm text-slate-500 mb-16 leading-relaxed font-serif italic opacity-80 text-center px-10">“即便每个人盒子里装的东西都不一样，甚至是个空盒，也不影响大家讨论‘甲虫’。” —— 维特根斯坦</p>
                                        <button onClick={() => setGameState('PLAYING')} className="px-24 py-6 bg-[#bcff00] text-black text-xs font-black uppercase tracking-[0.6em] hover:opacity-80 transition-all shadow-[0_0:50px_rgba(188,255,0,0.4)] rounded-sm uppercase">载入神经链路</button>
                                        <div className="pt-10 opacity-40 text-[11px] uppercase tracking-[0.8em] font-mono mt-10">© 云树CLOUDTREE</div>
                                    </div>
                                </div>
                            )}

                            {gameState === 'END' && (
                                <div className="absolute inset-0 z-[120] bg-black/98 flex items-center justify-center p-8 text-center backdrop-blur-3xl overflow-hidden">
                                    <div className="max-w-xl flex flex-col items-center z-[130]">
                                        <h2 className="text-4xl font-black text-white mb-5 tracking-[0.3em] uppercase italic">{finalStats.c >= 100 ? "协议达成" : "逻辑崩解"}</h2>
                                        <p className="text-sm text-slate-500 mb-12 font-serif italic opacity-80 leading-loose">
                                            {finalStats.c >= 100 ? "你已完美嵌入社会网格，私有感质彻底蒸发。" : "你的语言彻底崩解，成为了不可观测的孤独奇点。"}
                                        </p>
                                        <div className="w-full mb-12">
                                            <p className="text-[11px] text-white uppercase mb-4 font-mono tracking-[0.4em] font-black uppercase">定义你盒中的甲虫:</p>
                                            <textarea className="w-full bg-white/5 border border-[#bcff00]/30 rounded-2xl p-6 text-base text-[#bcff00] focus:border-[#bcff00] outline-none font-serif italic h-28 text-center resize-none transition-all shadow-inner" placeholder="例如：我盒子里是一场无声的雪..." value={qualiaInherited} onChange={e=>setQualiaInherited(e.target.value)} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-6 w-full">
                                            <button onClick={() => setIsPosterMode(true)} className="px-6 py-5 bg-[#bcff00] text-black text-xs font-black uppercase tracking-[0.3em] hover:opacity-80 transition-all flex items-center justify-center gap-3 rounded-xl shadow-[0_0:30px_rgba(188,255,0,0.3)] pointer-events-auto"><Icon name="image" size={18} /> 生成海报</button>
                                            <button onClick={() => setShowWittgenstein(true)} className="px-6 py-5 bg-white/10 border border-white/20 text-white text-xs font-black uppercase tracking-[0.3em] hover:bg-white/20 transition-all flex items-center justify-center gap-3 rounded-xl pointer-events-auto"><Icon name="book" size={18} /> 认识维特根斯坦</button>
                                            <button onClick={resetGame} className="col-span-2 py-5 text-white/40 text-[10px] font-black uppercase tracking-[0.6em] hover:text-white transition-all cursor-pointer">重启实验流程</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {showWittgenstein && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 z-[200] bg-black/95 flex items-center justify-center p-12 backdrop-blur-2xl overflow-hidden">
                                    <div className="max-w-2xl w-full bg-[#050a05] border border-[#bcff00]/40 p-12 rounded-[3rem] shadow-[0_0:100px_rgba(188,255,0,0.2)] relative max-h-[85vh] overflow-y-auto custom-scrollbar">
                                        <button onClick={() => setShowWittgenstein(false)} className="absolute top-10 right-12 text-[#bcff00] hover:scale-125 transition-transform"><Icon name="help" size={28}/></button>
                                        <div className="flex items-center gap-8 mb-12 border-b border-[#bcff00]/20 pb-10">
                                            <div className="w-24 h-24 rounded-3xl bg-[#bcff00]/10 flex items-center justify-center text-[#bcff00] border border-[#bcff00]/30 shadow-[0_0:30px_rgba(188,255,0,0.2)]"><Icon name="cpu" size={48} /></div>
                                            <div>
                                                <h2 className="text-[#bcff00] text-4xl font-black mb-2 uppercase">维特根斯坦</h2>
                                                <p className="text-[11px] text-white/40 uppercase tracking-[0.4em] font-mono italic">Ludwig Wittgenstein</p>
                                            </div>
                                        </div>
                                        <div className="text-slate-300 text-lg leading-relaxed space-y-8 font-serif text-left">
                                            <p>维特根斯坦通过“盒中甲虫”思想实验指出：语言本质上是公共规则。即使主观体验完全不同，只要我们在交流中共用一个词，私人的独特性在交流中便是可有可无的。</p>
                                            <div className="border-l-4 border-[#bcff00] pl-6 italic text-[#bcff00] text-base leading-loose">“如果我们谈论某个只有我能看到的东西，那么在我们的交流中，它根本算不上是一个‘东西’。”</div>
                                            <p>这台机器模拟了这种张力：追求共识意味着消散，坚守感质意味着孤独。你打算如何定义你的“甲虫”？</p>
                                        </div>
                                        <button onClick={() => setShowWittgenstein(false)} className="mt-12 w-full py-5 bg-[#bcff00] text-black font-black uppercase tracking-[0.5em] text-sm hover:opacity-80 rounded-xl shadow-2xl">确认并返回</button>
                                    </div>
                                </motion.div>
                            )}

                            {isPosterMode && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 z-[300] bg-[#020502]/98 flex items-center justify-center p-10 backdrop-blur-3xl cursor-pointer overflow-hidden" onClick={() => setIsPosterMode(false)}>
                                    <div className="relative w-full max-w-[550px] aspect-[3/4] bg-black border border-white/10 shadow-[0_0_120px_rgba(188,255,0,0.15)] flex flex-col items-center justify-between py-16 px-12 text-center rounded-sm overflow-hidden">
                                        <div className="absolute inset-0 bg-stippling opacity-10 pointer-events-none" />
                                        <div className="z-10 text-center">
                                            <h1 className="text-xl font-black text-white mb-2 tracking-[0.2em] opacity-80 uppercase text-center">哲学语言实验游戏</h1>
                                            <h1 className="beetle-title-green text-5xl font-black leading-tight uppercase text-center">「盒中甲虫」</h1>
                                        </div>
                                        <div className="relative w-full h-[45%] flex items-center justify-center">
                                            <CyberScarabEntity isOpen={false} stability={finalStats.s} consensus={finalStats.c} pulseRate={1.5} isContext="POSTER" />
                                        </div>
                                        <div className="z-10 text-center w-full px-6">
                                            <div className="text-[10px] text-[#bcff00]/60 uppercase font-mono tracking-[0.4em] mb-4">// 私有感质定义 //</div>
                                            <p className="qualia-text text-white text-2xl font-black italic beetle-title-green truncate px-4">“{qualiaInherited || "不可言说之物"}”</p>
                                            <div className="pt-10 border-t border-white/10 opacity-30 text-[9px] font-mono text-white tracking-[0.6em] uppercase italic mt-10">© 云树CLOUDTREE</div>
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
